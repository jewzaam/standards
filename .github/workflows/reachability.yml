name: Reachability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  reachability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check document reachability
        run: make reachability
