# Generated By: Claude Code (Claude Opus 4.7)
name: Fabcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fabcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for optional FABCHECK_RANGE diff scans

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: make install-dev PY_SYS=python
        # install-dev populates the venv so importlib.metadata.packages_distributions()
        # can build the precise top-level-import -> dist-name map (resolution_mode=precise).
        # Without this, fabcheck falls back to name-normalized matching and misses cases
        # like pillow/PIL, beautifulsoup4/bs4, opencv-python/cv2.

      - name: Run fabcheck
        run: make fabcheck

      - name: Annotate PR with missing findings
        if: always()
        run: |
          VERDICT=.tmp-fabcheck/verdict.json
          # .tmp-fabcheck/ follows the .tmp-<slug>/ convention: git-ignored
          # working dir with a self-written `*` .gitignore inside it.
          if [ ! -f "$VERDICT" ]; then
            echo "::warning::fabcheck did not produce a verdict.json"
            exit 0
          fi
          jq -r '.findings[] | select(.level=="missing") | "::error file=\(.file)::fabcheck: \(.lang) \(.symbol) - \(.message)"' "$VERDICT"

      - name: Upload verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabcheck-verdict
          path: .tmp-fabcheck/verdict.json
          if-no-files-found: ignore
